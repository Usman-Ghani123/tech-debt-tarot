<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Debt Tarot</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a12;
      --card-back-from: #1a0a2e;
      --card-back-to: #0d0520;
      --gold: #c9a84c;
      --card-front-bg: #0d0d1a;
      --wisdom: #e8e0d0;
      --green: #4afa9a;
      --red: #fa4a6a;
      --card-w: 160px;
      --card-h: 280px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1rem 4rem;
      color: var(--wisdom);
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(201,168,76,0.45), 0 0 50px rgba(201,168,76,0.2);
      letter-spacing: 0.08em;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: rgba(232,224,208,0.38);
      margin-top: 0.6rem;
      letter-spacing: 0.05em;
    }

    .draw-btn {
      font-family: 'Cinzel', serif;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--gold);
      background: transparent;
      border: 1px solid var(--gold);
      padding: 0.8rem 2.2rem;
      cursor: pointer;
      letter-spacing: 0.18em;
      margin-bottom: 3rem;
      transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .draw-btn:hover:not(:disabled) {
      background: rgba(201,168,76,0.07);
      box-shadow: 0 0 22px rgba(201,168,76,0.28);
    }

    .draw-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
      cursor: default;
    }

    .draw-btn.shaking {
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-4px); }
      40%       { transform: translateX(4px); }
      60%       { transform: translateX(-3px); }
      80%       { transform: translateX(3px); }
    }

    .spread {
      display: flex;
      gap: 2rem;
      align-items: flex-start;
      justify-content: center;
    }

    .slot {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.65rem;
    }

    .slot-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.2em;
      color: rgba(201,168,76,0.45);
      text-transform: uppercase;
      text-align: center;
    }

    .card-slot {
      width: var(--card-w);
      height: var(--card-h);
    }

    .card-slot-empty {
      width: 100%;
      height: 100%;
      border: 1px dashed rgba(201,168,76,0.18);
      border-radius: 4px;
    }

    .card-container {
      width: var(--card-w);
      height: var(--card-h);
      perspective: 900px;
    }

    .card-container.entering {
      animation: fadeSlideIn 0.4s ease both;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.7s ease-in-out;
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-back,
    .card-front {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border: 1px solid var(--gold);
      border-radius: 4px;
      overflow: hidden;
    }

    .card-back {
      background: radial-gradient(ellipse at 50% 40%, var(--card-back-from) 0%, var(--card-back-to) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-back::before {
      content: '';
      position: absolute;
      inset: 7px;
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 2px;
    }

    .card-back-sigil {
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      color: var(--gold);
      opacity: 0.55;
      text-shadow: 0 0 18px rgba(201,168,76,0.5);
      user-select: none;
    }

    .card-front {
      background: var(--card-front-bg);
      transform: rotateY(180deg);
    }

    .card-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 0.75rem 0.7rem;
    }

    .card-content.glitching {
      animation: glitch 0.15s ease;
    }

    .card-header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.45rem;
    }

    .card-number {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: rgba(201,168,76,0.55);
      letter-spacing: 0.05em;
    }

    .card-orientation {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      padding: 2px 5px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .card-orientation.upright {
      color: var(--green);
      border: 1px solid var(--green);
    }

    .card-orientation.reversed {
      color: var(--red);
      border: 1px solid var(--red);
    }

    .card-name {
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--gold);
      line-height: 1.3;
      margin-bottom: 0.6rem;
    }

    .card-wisdom {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.68rem;
      color: var(--wisdom);
      line-height: 1.55;
      flex: 1;
    }

    .card-divider {
      border: none;
      border-top: 1px solid rgba(201,168,76,0.18);
      margin: 0.55rem 0;
    }

    .card-trace {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.52rem;
      color: var(--green);
      line-height: 1.45;
      white-space: pre-wrap;
      word-break: break-all;
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes glitch {
      0%   { transform: translate(0, 0);       opacity: 1; }
      12%  { transform: translate(-3px, 0);    opacity: 0.75; }
      25%  { transform: translate(3px, 1px);   opacity: 1; }
      37%  { transform: translate(-2px, -1px); opacity: 0.85; }
      50%  { transform: translate(0, 2px);     opacity: 1; }
      62%  { transform: translate(2px, 0);     opacity: 0.8; }
      75%  { transform: translate(-1px, 1px);  opacity: 1; }
      100% { transform: translate(0, 0);       opacity: 1; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">&#10022; TECH DEBT TAROT &#10022;</h1>
    <p class="subtitle">// consult the ancient wisdom of your codebase</p>
  </header>

  <button class="draw-btn" id="draw-btn">&#10022; CONSULT THE STACK &#10022;</button>

  <div class="spread">
    <div class="slot">
      <div class="slot-label">Legacy Code</div>
      <div class="card-slot" data-slot="0"><div class="card-slot-empty"></div></div>
    </div>
    <div class="slot">
      <div class="slot-label">Current Sprint</div>
      <div class="card-slot" data-slot="1"><div class="card-slot-empty"></div></div>
    </div>
    <div class="slot">
      <div class="slot-label">Tech Debt Ahead</div>
      <div class="card-slot" data-slot="2"><div class="card-slot-empty"></div></div>
    </div>
  </div>

  <script>
    // app code goes here
  </script>
</body>
</html>
